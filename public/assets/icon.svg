<?xml version="1.0" encoding="UTF-8"?>
<!--
  Box2048 app icon source artwork.

  Design:
    - Rounded square background in the game's deep navy (#1a1a2e).
    - A large gradient-filled rounded square "cube" in the center, colored
      in the orange tones used by the 8/16/32 cube values in the game.
    - Bold white "2048" label centered on the cube.
    - A subtle accent red glow on the top edge to tie in the danger line /
      accent color used throughout the game UI.
    - Small white sparkles in the corners to suggest merging/energy.

  All sizes for Android (mdpi 48px → xxxhdpi 192px) and the Play Store
  512px icon are rasterized from this single SVG via scripts/generate_icons.py.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient: top-left brighter, bottom-right darker. -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f1f3a" />
      <stop offset="100%" stop-color="#0f0f23" />
    </linearGradient>
    <!-- Cube gradient: warm orange like the 16-tile in 2048. -->
    <linearGradient id="cube" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59563" />
      <stop offset="60%" stop-color="#f67c5f" />
      <stop offset="100%" stop-color="#e94560" />
    </linearGradient>
    <!-- Inner top highlight for a glossy look. -->
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <!-- Soft shadow under the cube. -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="8" result="off" />
      <feComponentTransfer><feFuncA type="linear" slope="0.5" /></feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square (matches Android adaptive icon safe zone). -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bg)" />

  <!-- The cube. 320x320, centered. -->
  <g filter="url(#shadow)">
    <rect x="96" y="96" width="320" height="320" rx="48" ry="48" fill="url(#cube)" />
  </g>
  <!-- Glossy top highlight inside the cube. -->
  <rect x="112" y="112" width="288" height="140" rx="36" ry="36" fill="url(#gloss)" />
  <!-- Bottom shadow strip for depth. -->
  <rect x="112" y="384" width="288" height="20" rx="10" ry="10" fill="#000000" opacity="0.22" />
  <!-- Thin inner outline for crispness on small sizes. -->
  <rect x="96" y="96" width="320" height="320" rx="48" ry="48" fill="none" stroke="#000000" stroke-opacity="0.25" stroke-width="3" />

  <!-- The "2048" label. -->
  <text x="256" y="262"
        font-family="'Arial Black', 'Helvetica', sans-serif"
        font-size="96" font-weight="900"
        fill="#ffffff" text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="-2">2048</text>

  <!-- Corner sparkles suggesting merging energy. -->
  <g fill="#edc850" opacity="0.9">
    <!-- Top-left sparkle -->
    <path d="M48 48 L56 64 L72 72 L56 80 L48 96 L40 80 L24 72 L40 64 Z" />
    <!-- Bottom-right sparkle -->
    <path d="M464 416 L470 428 L482 434 L470 440 L464 452 L458 440 L446 434 L458 428 Z" />
  </g>

  <!-- Top accent red line — references the game's danger line. -->
  <rect x="96" y="60" width="320" height="6" rx="3" ry="3" fill="#e94560" opacity="0.85" />
</svg>
